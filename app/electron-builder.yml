appId: com.mrowe.crystalis-autotracker
productName: Crystalis Autotracker
directories:
  output: release
files:
  - out/**
  - package.json
  - "!node_modules/**"
  - node_modules/crystalis-randomizer/**
extraResources:
  - from: lua
    to: lua
asarUnpack:
  - node_modules/crystalis-randomizer/**
mac:
  target:
    - dmg
    - zip
  category: public.app-category.games
  identity: null
npmRebuild: false
